<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniture Mart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f8f8f8;
        }
        header {
            background: #5a3e2b;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #a67c52;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        .container {
            padding: 20px;
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .product {
            background: white;
            padding: 15px;
            width: 220px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .product button {
            background: #5a3e2b;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            margin-top: 10px;
        }
        footer {
            background: #5a3e2b;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Furniture Mart</h1>
    <p>Quality Furniture for Your Home</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Sofas</a>
    <a href="#">Chairs</a>
    <a href="#">Tables</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Our Products</h2>

</html>
